site_name: Flood Development Roadmap
site_description: Tracking features, fixes, and balancing for the Flood gamemode.
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/toggle-switch-outline
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Development Roadmap: todo.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/redwolfeey/redwolfeey.github.io
